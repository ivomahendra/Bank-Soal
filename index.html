<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pembuat Soal SMP · Kurikulum Merdeka</title>
    <style>
        /* ----- RESET & GLOBAL ----- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0, 20, 30, 0.12);
            padding: 30px 35px;
            transition: 0.3s;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            border-bottom: 2px solid #e9edf2;
            padding-bottom: 18px;
            margin-bottom: 28px;
        }
        header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #0b2b3d;
        }
        header p {
            color: #4a6a7f;
            font-weight: 500;
            font-size: 14px;
            background: #eef3f7;
            padding: 6px 14px;
            border-radius: 30px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 18px 20px;
            margin-bottom: 24px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: #1f3a4b;
            letter-spacing: 0.3px;
        }
        .form-group input,
        .form-group select {
            padding: 10px 12px;
            border: 1.5px solid #dbe1e8;
            border-radius: 14px;
            font-size: 14px;
            background: #fafcff;
            transition: 0.2s;
        }
        .form-group input:focus,
        .form-group select:focus {
            border-color: #2d7aff;
            outline: none;
            box-shadow: 0 0 0 3px rgba(45, 122, 255, 0.15);
        }
        .form-actions {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: #1a5cff;
            color: white;
            box-shadow: 0 6px 14px rgba(26, 92, 255, 0.3);
        }
        .btn-primary:hover {
            background: #0a4ad0;
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(26, 92, 255, 0.35);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn-secondary {
            background: #e4eaf0;
            color: #1f3a4b;
        }
        .btn-secondary:hover {
            background: #d0d9e2;
        }
        .btn-success {
            background: #0f9d58;
            color: white;
            box-shadow: 0 6px 14px rgba(15, 157, 88, 0.3);
        }
        .btn-success:hover {
            background: #0b7e47;
            transform: translateY(-2px);
        }
        .status {
            padding: 14px 18px;
            border-radius: 16px;
            margin: 18px 0 10px;
            font-weight: 500;
            display: none;
        }
        .status.show {
            display: block;
        }
        .status.loading {
            background: #eef4ff;
            color: #1a5cff;
            border-left: 5px solid #1a5cff;
        }
        .status.success {
            background: #e6f7ed;
            color: #0b7e47;
            border-left: 5px solid #0f9d58;
        }
        .status.error {
            background: #ffeaea;
            color: #b33636;
            border-left: 5px solid #d93030;
        }
        .soal-area {
            margin-top: 28px;
            border-top: 2px solid #e9edf2;
            padding-top: 24px;
        }
        .soal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .soal-header h2 {
            font-size: 20px;
            color: #0b2b3d;
        }
        .soal-meta {
            font-size: 14px;
            color: #4a6a7f;
            background: #eef3f7;
            padding: 4px 16px;
            border-radius: 30px;
        }
        .soal-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .soal-item {
            background: #fafcff;
            border-radius: 18px;
            padding: 20px 24px;
            border: 1px solid #e9edf2;
            transition: 0.15s;
        }
        .soal-item:hover {
            border-color: #cbd5e1;
        }
        .soal-item .nomor {
            font-weight: 700;
            color: #1a5cff;
            margin-right: 10px;
        }
        .soal-item .pertanyaan {
            font-weight: 500;
            margin-bottom: 12px;
            font-size: 15px;
        }
        .opsi {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 6px 0 6px 16px;
        }
        .opsi input[type="radio"] {
            width: 18px;
            height: 18px;
            accent-color: #1a5cff;
            cursor: pointer;
        }
        .opsi label {
            font-size: 14px;
            cursor: pointer;
        }
        .hasil-area {
            margin-top: 30px;
            border-top: 2px solid #e9edf2;
            padding-top: 24px;
        }
        .hasil-area h2 {
            font-size: 20px;
            color: #0b2b3d;
            margin-bottom: 16px;
        }
        .hasil-container {
            background: #f8fbfe;
            border-radius: 20px;
            padding: 20px 26px;
            border: 1px solid #dbe1e8;
        }
        .hasil-container .nilai {
            font-size: 28px;
            font-weight: 700;
            color: #1a5cff;
        }
        .hasil-container .feedback {
            margin-top: 12px;
            font-size: 15px;
            background: #eef3f7;
            padding: 12px 18px;
            border-radius: 14px;
        }
        footer {
            margin-top: 40px;
            text-align: center;
            font-size: 13px;
            color: #7b93a8;
            border-top: 1px solid #e9edf2;
            padding-top: 20px;
        }
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(3px);
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            background: white;
            max-width: 420px;
            width: 90%;
            padding: 30px 28px;
            border-radius: 28px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.2);
            text-align: center;
        }
        .modal-content h3 {
            font-size: 22px;
            margin-bottom: 8px;
        }
        .modal-content p {
            color: #4a6a7f;
            margin: 16px 0 24px;
        }
        .modal-close {
            float: right;
            font-size: 26px;
            font-weight: 300;
            cursor: pointer;
            color: #7b93a8;
            transition: 0.15s;
        }
        .modal-close:hover {
            color: #1f3a4b;
        }
        @media (max-width: 600px) {
            .container {
                padding: 18px 16px;
            }
            .form-grid {
                grid-template-columns: 1fr;
            }
            .form-actions {
                flex-direction: column;
            }
            .btn {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>📝 Pembuat Soal SMP</h1>
        <p>Kurikulum Merdeka · AI Gemini</p>
    </header>

    <!-- FORM -->
    <section class="form-section">
        <div class="form-grid">
            <div class="form-group">
                <label for="nama">Nama Siswa</label>
                <input type="text" id="nama" placeholder="Masukkan nama" />
            </div>
            <div class="form-group">
                <label for="kelas">Kelas</label>
                <select id="kelas">
                    <option value="7">VII (7)</option>
                    <option value="8">VIII (8)</option>
                    <option value="9">IX (9)</option>
                </select>
            </div>
            <div class="form-group">
                <label for="mapel">Mata Pelajaran</label>
                <select id="mapel">
                    <option value="Matematika">Matematika</option>
                    <option value="IPA">IPA</option>
                    <option value="IPS">IPS</option>
                    <option value="Bahasa Indonesia">Bahasa Indonesia</option>
                    <option value="Bahasa Inggris">Bahasa Inggris</option>
                    <option value="PPKn">PPKn</option>
                    <option value="PJOK">PJOK</option>
                    <option value="Seni Budaya">Seni Budaya</option>
                    <option value="Informatika">Informatika</option>
                    <option value="Prakarya">Prakarya</option>
                </select>
            </div>
            <div class="form-group">
                <label for="semester">Semester</label>
                <select id="semester">
                    <option value="1">Semester 1</option>
                    <option value="2">Semester 2</option>
                </select>
            </div>
            <div class="form-group">
                <label for="level">Level Kesulitan</label>
                <select id="level">
                    <option value="Mudah">Mudah</option>
                    <option value="Sedang" selected>Sedang</option>
                    <option value="Sulit">Sulit</option>
                </select>
            </div>
            <div class="form-group">
                <label for="tipe">Tipe Soal</label>
                <select id="tipe">
                    <option value="pg">Pilihan Ganda (20 soal)</option>
                    <option value="easi">Easi (10 soal + penilaian AI)</option>
                </select>
            </div>
        </div>
        <div class="form-actions">
            <button id="btnGenerate" class="btn btn-primary">🚀 Generate Soal</button>
            <button id="btnBukaSheet" class="btn btn-secondary" disabled>📊 Buka Google Sheet</button>
        </div>
    </section>

    <!-- STATUS -->
    <div id="status" class="status"></div>

    <!-- SOAL AREA -->
    <section id="soalArea" class="soal-area" style="display:none;">
        <div class="soal-header">
            <h2>📖 Soal <span id="soalTipe"></span></h2>
            <div class="soal-meta" id="soalInfo"></div>
        </div>
        <div id="soalContainer" class="soal-container"></div>
        <div id="jawabanArea" style="margin-top:24px; display:none;">
            <button id="btnSubmitJawaban" class="btn btn-success">✅ Kirim Jawaban</button>
        </div>
    </section>

    <!-- HASIL -->
    <section id="hasilArea" class="hasil-area" style="display:none;">
        <h2>📊 Hasil Pekerjaan</h2>
        <div id="hasilContainer" class="hasil-container"></div>
    </section>

    <footer>
        <p>Dibuat dengan ❤️ · Google Apps Script + Gemini AI</p>
    </footer>
</div>

<!-- MODAL SHEET -->
<div id="modalSheet" class="modal">
    <div class="modal-content">
        <span class="modal-close" id="modalClose">&times;</span>
        <h3>📊 Google Sheet</h3>
        <p>Sheet berisi soal telah dibuat. Klik tombol di bawah untuk membuka.</p>
        <button id="btnModalBukaSheet" class="btn btn-primary">Buka Sheet</button>
    </div>
</div>

<script>
    // ============================================================
    //  FRONTEND JAVASCRIPT
    // ============================================================

    // --- Konfigurasi ---
    // GANTI URL_INI dengan URL Web App setelah deploy
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyUPrNGLU8oTzSpSRxMSobAi5r6BGaxAdnpg8CqeIdFW2tOPSwNESCGzmkauHlC5IbHlQ/exec'; // <-- GANTI

    // --- DOM refs ---
    const btnGenerate = document.getElementById('btnGenerate');
    const btnBukaSheet = document.getElementById('btnBukaSheet');
    const btnSubmitJawaban = document.getElementById('btnSubmitJawaban');
    const statusDiv = document.getElementById('status');
    const soalArea = document.getElementById('soalArea');
    const soalContainer = document.getElementById('soalContainer');
    const soalTipe = document.getElementById('soalTipe');
    const soalInfo = document.getElementById('soalInfo');
    const jawabanArea = document.getElementById('jawabanArea');
    const hasilArea = document.getElementById('hasilArea');
    const hasilContainer = document.getElementById('hasilContainer');
    const modalSheet = document.getElementById('modalSheet');
    const modalClose = document.getElementById('modalClose');
    const btnModalBukaSheet = document.getElementById('btnModalBukaSheet');

    let currentSoalData = null;      // menyimpan data soal dari server
    let currentSheetUrl = null;      // url sheet yang dibuat
    let currentTipe = 'pg';          // 'pg' atau 'easi'

    // --- Helper status ---
    function setStatus(msg, type = 'loading') {
        statusDiv.textContent = msg;
        statusDiv.className = 'status show ' + type;
    }
    function hideStatus() {
        statusDiv.className = 'status';
        statusDiv.textContent = '';
    }

    // --- Tampilkan modal sheet ---
    function showModalSheet(url) {
        currentSheetUrl = url;
        modalSheet.classList.add('show');
    }
    modalClose.addEventListener('click', () => modalSheet.classList.remove('show'));
    window.addEventListener('click', (e) => {
        if (e.target === modalSheet) modalSheet.classList.remove('show');
    });
    btnModalBukaSheet.addEventListener('click', () => {
        if (currentSheetUrl) {
            window.open(currentSheetUrl, '_blank');
        }
    });

    // --- Render soal ke DOM ---
    function renderSoal(soalData) {
        const { soal, tipe, kelas, mapel, semester, level, jumlah } = soalData;
        soalContainer.innerHTML = '';
        soalTipe.textContent = tipe === 'pg' ? 'Pilihan Ganda (20)' : 'Easi (10)';
        soalInfo.textContent = `${kelas} · ${mapel} · Semester ${semester} · Level ${level}`;

        soal.forEach((item, idx) => {
            const div = document.createElement('div');
            div.className = 'soal-item';
            const nomor = idx + 1;
            let opsiHtml = '';
            if (tipe === 'pg') {
                // opsi: array of { label, text }
                const opsiList = item.opsi || [];
                opsiList.forEach((op, i) => {
                    const letter = String.fromCharCode(65 + i); // A,B,C,D
                    opsiHtml += `
                        <div class="opsi">
                            <input type="radio" name="q${nomor}" value="${letter}" id="q${nomor}_${letter}" />
                            <label for="q${nomor}_${letter}">${letter}. ${op.text}</label>
                        </div>
                    `;
                });
            } else {
                // Easi: input angka 1-10
                opsiHtml = `
                    <div style="margin: 8px 0 0 16px;">
                        <label for="q${nomor}_nilai" style="font-weight:500;">Nilai (1-10): </label>
                        <input type="number" id="q${nomor}_nilai" min="1" max="10" value="5" style="width:70px; padding:6px; border-radius:10px; border:1px solid #ccc;" />
                    </div>
                `;
            }

            div.innerHTML = `
                <div><span class="nomor">${nomor}.</span> <span class="pertanyaan">${item.pertanyaan}</span></div>
                ${opsiHtml}
            `;
            soalContainer.appendChild(div);
        });

        // Tampilkan area jawaban
        jawabanArea.style.display = 'block';
        hasilArea.style.display = 'none';
        soalArea.style.display = 'block';
    }

    // --- Submit jawaban (untuk Easi) ---
    async function submitJawaban() {
        if (currentTipe !== 'easi') {
            setStatus('Fitur kirim jawaban hanya untuk mode Easi.', 'error');
            return;
        }
        // Ambil jawaban
        const soalItems = document.querySelectorAll('.soal-item');
        const jawaban = [];
        soalItems.forEach((item, idx) => {
            const inputNilai = item.querySelector('input[type="number"]');
            if (inputNilai) {
                jawaban.push(parseInt(inputNilai.value) || 0);
            } else {
                // fallback
                jawaban.push(0);
            }
        });

        // Kirim ke server untuk dinilai
        setStatus('⏳ Menilai jawaban dengan AI ...', 'loading');
        try {
            const payload = {
                action: 'nilaiEasi',
                data: {
                    jawaban: jawaban,
                    soal: currentSoalData.soal,
                    nama: document.getElementById('nama').value || 'Tanpa Nama',
                    kelas: document.getElementById('kelas').value,
                    mapel: document.getElementById('mapel').value,
                    semester: document.getElementById('semester').value,
                    level: document.getElementById('level').value,
                }
            };
            const response = await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors', // karena Apps Script, pakai no-cors agar tidak error CORS, tapi response tidak bisa dibaca.
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            // Karena no-cors, response tidak bisa diakses. Kita perlu pakai mode 'cors' dengan JSONP atau redirect.
            // Untuk keperluan demo, kita akan simulasi dengan mengasumsikan server mengembalikan JSON jika menggunakan mode 'cors'.
            // Sebaiknya deploy dengan mengaktifkan CORS di Apps Script (tidak mungkin), jadi kita gunakan pendekatan: server mengembalikan HTML atau redirect.
            // Cara aman: gunakan Google Apps Script Web App yang mengembalikan JSON dengan Content-Type application/json dan mode 'cors' (sebenarnya bisa).
            // Untuk demo, kita gunakan pendekatan dengan iframe? Lebih sederhana: kita asumsikan server mengembalikan JSON.
            // Kita ubah mode menjadi 'cors' agar response bisa dibaca.
            // Tapi karena kita tidak bisa mengubah CORS di sisi server, kita akan gunakan metode dengan mengirimkan sebagai form data? 
            // Yang umum: Apps Script Web App dengan doPost dapat menerima JSON dan mengembalikan JSON jika di-set dengan Content-Type.
            // Kita akan gunakan mode 'cors' dan pastikan server mengembalikan JSON.
            // Saya akan set ulang fetch tanpa no-cors, tapi jika terjadi error CORS, kita akan tangani.
            // Untuk keperluan demo, kita akan gunakan pendekatan alternatif: kita akan panggil fungsi dengan JSONP? Tidak praktis.
            // Saya akan tulis kode dengan asumsi user akan deploy dan mengatur CORS di Apps Script (sebenarnya tidak perlu, karena web app bisa diakses publik).
            // Sebenarnya kita bisa mengakses web app dengan mode 'cors' asalkan server mengembalikan header yang tepat.
            // Apps Script secara default mendukung CORS untuk permintaan dari origin yang diizinkan? Tidak secara default.
            // Tapi untuk web app yang di-deploy sebagai "Anyone, even anonymous" dan mengembalikan JSON, kita bisa menggunakan mode 'cors' dengan opsi credentials 'omit'.
            // Saya akan gunakan mode 'cors' dan menangani error.
            // Karena ini demo, kita akan beralih ke mode 'cors'.
            const resp2 = await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (!resp2.ok) throw new Error('Gagal menilai: ' + resp2.status);
            const result = await resp2.json();
            // Tampilkan hasil
            tampilkanHasil(result);
        } catch (err) {
            setStatus('❌ Error: ' + err.message, 'error');
            console.error(err);
        }
    }

    function tampilkanHasil(result) {
        hasilArea.style.display = 'block';
        const { nilai, feedback, jawabanSiswa, jawabanBenar } = result;
        let html = `<div><span class="nilai">Nilai: ${nilai}/10</span></div>`;
        if (feedback) {
            html += `<div class="feedback">💬 ${feedback}</div>`;
        }
        if (jawabanSiswa && jawabanBenar) {
            html += `<div style="margin-top:12px; font-size:14px; color:#2c3e50;">`;
            jawabanSiswa.forEach((jaw, idx) => {
                const benar = jaw === jawabanBenar[idx];
                html += `<div>Soal ${idx+1}: Jawaban ${jaw} ${benar ? '✅' : '❌'} (benar: ${jawabanBenar[idx]})</div>`;
            });
            html += `</div>`;
        }
        hasilContainer.innerHTML = html;
        // sembunyikan tombol submit
        jawabanArea.style.display = 'none';
        setStatus('✅ Penilaian selesai!', 'success');
    }

    // --- Generate soal ---
    async function generateSoal() {
        const nama = document.getElementById('nama').value.trim() || 'Siswa';
        const kelas = document.getElementById('kelas').value;
        const mapel = document.getElementById('mapel').value;
        const semester = document.getElementById('semester').value;
        const level = document.getElementById('level').value;
        const tipe = document.getElementById('tipe').value; // 'pg' atau 'easi'

        // Validasi
        if (!nama) {
            setStatus('❌ Nama siswa harus diisi.', 'error');
            return;
        }

        setStatus('⏳ Menghasilkan soal dengan AI ...', 'loading');
        btnGenerate.disabled = true;

        try {
            const payload = {
                action: 'generateSoal',
                data: {
                    nama, kelas, mapel, semester, level, tipe
                }
            };
            const response = await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (!response.ok) throw new Error('Gagal generate: ' + response.status);
            const result = await response.json();
            // result: { status, soal, sheetUrl, tipe, kelas, mapel, semester, level, jumlah }
            if (result.status === 'success') {
                currentSoalData = result;
                currentTipe = tipe;
                // Simpan sheetUrl
                if (result.sheetUrl) {
                    btnBukaSheet.disabled = false;
                    btnBukaSheet.onclick = () => showModalSheet(result.sheetUrl);
                }
                renderSoal(result);
                setStatus(`✅ ${result.jumlah} soal berhasil dibuat!`, 'success');
                // Jika tipe pg, tidak perlu submit jawaban, tapi kita sembunyikan tombol kirim
                if (tipe === 'pg') {
                    jawabanArea.style.display = 'none';
                } else {
                    // Easi: tampilkan tombol kirim
                    jawabanArea.style.display = 'block';
                    btnSubmitJawaban.onclick = submitJawaban;
                }
            } else {
                setStatus('❌ Gagal: ' + (result.message || 'Unknown error'), 'error');
            }
        } catch (err) {
            setStatus('❌ Error: ' + err.message, 'error');
            console.error(err);
        } finally {
            btnGenerate.disabled = false;
        }
    }

    // --- Event listeners ---
    btnGenerate.addEventListener('click', generateSoal);
    btnBukaSheet.addEventListener('click', () => {
        if (currentSheetUrl) showModalSheet(currentSheetUrl);
    });

    // --- Inisialisasi ---
    console.log('Aplikasi siap. URL Web App:', WEB_APP_URL);
</script>
</body>
</html>
