<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>AI Learning App - Kurikulum Merdeka</title>
    
    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Library untuk PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <!-- Library untuk rendering matematika (MathJax) -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true,
                processEnvironments: true,
                packages: {'[+]': ['noerrors']}
            },
            options: {
                ignoreHtmlClass: 'tex2jax_ignore',
                processHtmlClass: 'tex2jax_process'
            },
            loader: {
                load: ['[tex]/noerrors']
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script"></script>
</head>
<body>
    <div class="container">
        <h1>Ruang Belajar AI - Kurikulum Merdeka</h1>
        
        <!-- Form Filter Soal -->
        <section class="filter-section">
            <h2>📋 Pilih Latihan</h2>
            <div class="filter-grid">
                <div class="form-group">
                    <label>Kelas</label>
                    <select id="kelas" required>
                        <option value="">-- Pilih Kelas --</option>
                        <option value="1">1 SD</option>
                        <option value="2">2 SD</option>
                        <option value="3">3 SD</option>
                        <option value="4">4 SD</option>
                        <option value="5">5 SD</option>
                        <option value="6">6 SD</option>
                        <option value="7">7 SMP</option>
                        <option value="8">8 SMP</option>
                        <option value="9">9 SMP</option>
                        <option value="10">10 SMA</option>
                        <option value="11">11 SMA</option>
                        <option value="12">12 SMA</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Mata Pelajaran</label>
                    <select id="mapel"></select>
                </div>
                <div class="form-group">
                    <label>Jenis Ujian</label>
                    <select id="jenis">
                        <option value="Harian">📝 Ulangan Harian</option>
                        <option value="UAS">📚 UAS</option>
                        <option value="OSN">🏆 OSN</option>
                        <option value="TKA">🎯 TKA/UTBK</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Jumlah Soal (1-30)</label>
                    <input type="number" id="jumlah" min="1" max="30" value="3">
                </div>
                
                <!-- Materi (dinamis) - muncul untuk Ulangan Harian -->
                <div class="form-group" id="materi-group" style="display: none;">
                    <label>Materi</label>
                    <select id="materi">
                        <option value="">-- Pilih Materi --</option>
                    </select>
                </div>
                
                <!-- Semester (untuk UAS) -->
                <div class="form-group" id="semester-group" style="display: none;">
                    <label>Semester</label>
                    <select id="semester">
                        <option value="1">Semester 1</option>
                        <option value="2">Semester 2</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Nama Kamu</label>
                    <input type="text" id="namaUser" placeholder="Masukkan nama" required>
                </div>
                <button id="btnGenerate">🎯 Mulai Latihan</button>
            </div>
        </section>

        <!-- Area Soal -->
        <section class="soal-section" id="soalSection" style="display: none;">
            <div class="soal-header">
                <h2>📝 Soal Latihan</h2>
                <div class="timer">⏱️ <span id="timerDisplay">00:00</span></div>
                <div class="action-buttons">
                    <button id="btnExportPDF">📥 Export PDF</button>
                    <button id="btnCekSemua">✅ Cek Jawaban</button>
                    <button id="btnSelesai">🏁 Selesai & Simpan</button>
                </div>
            </div>
            <div id="soalContainer"></div>
        </section>

        <!-- Riwayat Pengerjaan (History) -->
        <section class="history-section">
            <h2>📚 Riwayat Pengerjaan</h2>
            
            <!-- Filter Riwayat -->
            <div class="history-filters">
                <div class="filter-row">
                    <div class="form-group">
                        <label>Filter Nama</label>
                        <input type="text" id="filterNama" placeholder="Cari nama..." value="">
                    </div>
                    <div class="form-group">
                        <label>Filter Kelas</label>
                        <select id="filterKelas">
                            <option value="">Semua Kelas</option>
                        </select>
                    </div>
                    <button id="btnApplyFilter" class="btn-filter">🔍 Terapkan Filter</button>
                    <button id="btnResetFilter" class="btn-filter">🔄 Reset</button>
                </div>
            </div>
            
            <div id="historyList" class="history-list">
                <p class="loading">Memuat riwayat...</p>
            </div>
        </section>
    </div>

    <footer>
        <p>AI Learning App &copy; 2026 - Belajar dengan Kurikulum Merdeka</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
